<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Korean Movie Subtitle Learner</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f4f4f5;color:#111827}#app{max-width:820px;margin:0 auto;min-height:100dvh;background:#fff;display:flex;flex-direction:column}.video{height:220px;background:linear-gradient(140deg,#3f2a1d,#7c4a21 45%,#2b1c15);position:relative;overflow:hidden;color:#fff}.video:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 25% 35%,rgba(255,185,75,.55),transparent 18%),radial-gradient(circle at 70% 28%,rgba(255,210,100,.35),transparent 13%),linear-gradient(rgba(0,0,0,.1),rgba(0,0,0,.35))}.cave{position:absolute;left:25px;bottom:54px;font-size:54px;filter:drop-shadow(0 4px 4px #0006)}.play{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:82px;height:82px;border-radius:50%;display:grid;place-items:center;background:#ffffff20}.play:after{content:"";border-left:30px solid #fff;border-top:20px solid transparent;border-bottom:20px solid transparent;margin-left:8px}.back,.vbtn{position:absolute;top:24px;width:50px;height:50px;border-radius:50%;background:#ffffffdd;color:#111;display:grid;place-items:center;font-size:25px;font-weight:800}.back{left:22px}.vbtn{right:24px;font-size:20px}.vbtn.a{right:90px}.vbtn.b{right:156px}.full{position:absolute;right:22px;bottom:34px;width:54px;height:54px;border-radius:50%;background:#0008;display:grid;place-items:center;font-size:23px}.progress{position:absolute;left:24px;right:24px;bottom:18px;height:4px;background:#ffffff80;border-radius:5px}.progress span{display:block;width:22%;height:100%;background:#0b84ff;border-radius:5px}.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e7eb}.tab{flex:1;text-align:center;padding:14px 4px;font-size:20px;font-weight:800;color:#6b7280}.tab.active{color:#0877ff;border-bottom:4px solid #0877ff}.tools{display:flex;gap:9px;align-items:center;padding:12px 14px;border-bottom:1px solid #e5e7eb;background:#fff;overflow:auto}.pill{border:1px solid #d1d5db;border-radius:12px;padding:9px 12px;background:#fff;color:#374151;font-size:14px;white-space:nowrap}.pill.blue{border-color:#0877ff;color:#0877ff;background:#eff6ff}.reader{flex:1;overflow-y:auto;background:#fafafa;padding-bottom:94px}.course{padding:18px 18px 8px;background:#fff;font-size:22px;font-weight:850;line-height:1.25}.line{position:relative;background:#fff;border-bottom:1px solid #e5e7eb;padding:18px 50px 16px 18px}.speaker{position:absolute;left:18px;top:26px;color:#0877ff;font-size:21px}.linebody{margin-left:36px}.words{display:flex;flex-wrap:wrap;gap:12px 12px;align-items:flex-end}.w{display:flex;flex-direction:column;align-items:center;min-width:34px;max-width:92px;border:0;background:transparent;padding:0;cursor:pointer}.roman{font-size:13px;color:#8a8f99;margin-bottom:3px;min-height:15px;white-space:nowrap}.ko{font-size:28px;line-height:1.05;font-weight:900;border-radius:4px;padding:0 4px 3px;color:#111}.en{font-size:13px;color:#222;margin-top:5px;text-align:center;line-height:1.15;min-height:15px;max-width:100px}.w:nth-child(7n+1) .ko{background:#f8c9e9}.w:nth-child(7n+2) .ko{background:#a8ede8}.w:nth-child(7n+3) .ko{background:#ffe29a}.w:nth-child(7n+4) .ko{background:#b9f4c4}.w:nth-child(7n+5) .ko{background:#ffd3bb}.w:nth-child(7n+6) .ko{background:#c7d2fe}.w:nth-child(7n) .ko{background:#fde68a}.sent{font-size:20px;line-height:1.35;margin-top:13px;color:#111}.koraw{font-size:14px;color:#6b7280;margin-top:4px}.star{position:absolute;right:18px;top:30px;font-size:27px;color:#111}.more{position:absolute;right:17px;top:66px;font-size:24px;color:#111}.bottom{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(790px,calc(100% - 24px));background:#fff;border-radius:28px;box-shadow:0 10px 30px #0002;border:1px solid #eee;padding:11px 12px 13px}.inputrow{display:flex;gap:8px;align-items:end}textarea{flex:1;border:1px solid #d1d5db;border-radius:14px;padding:10px 11px;font-size:16px;resize:none;max-height:100px;font-family:inherit}.btn{border:0;border-radius:14px;padding:11px 15px;background:#0877ff;color:white;font-weight:800;font-size:15px}.btn.gray{background:#111827}.smallrow{display:flex;justify-content:space-around;margin-top:10px;font-weight:700;color:#111;font-size:13px}.smallrow span{display:flex;flex-direction:column;align-items:center;gap:2px}.ico{font-size:20px}.empty{padding:28px;text-align:center;color:#6b7280;line-height:1.45}.modal{position:fixed;inset:0;background:#0005;display:none;place-items:end center}.sheet{width:min(820px,100%);background:#fff;border-radius:24px 24px 0 0;padding:22px 18px 30px}.sheet h3{margin:0 0 8px;font-size:26px}.sheet p{font-size:18px;margin:8px 0}.close{float:right;border:0;background:#eee;border-radius:12px;padding:8px 12px;font-weight:800}@media (max-width:520px){.video{height:190px}.tab{font-size:18px}.course{font-size:20px}.ko{font-size:25px}.sent{font-size:18px}.line{padding-right:44px}.w{max-width:82px}.en{font-size:12px}.roman{font-size:12px}}
</style>
</head>
<body>
<div id="app">
  <div class="video">
    <div class="back">‹</div><div class="cave">🐯</div>
    <div class="vbtn b">漢</div><div class="vbtn a">文A</div><div class="vbtn">🔖</div>
    <div class="play"></div><div class="full">⛶</div><div class="progress"><span></span></div>
  </div>
  <div class="tabs"><div class="tab active">▣ Subtitles</div><div class="tab">Dictation</div><div class="tab">Shadowing</div></div>
  <div class="tools"><span>Language pair:</span><button class="pill blue">Korean → English</button><button class="pill">English → Korean</button><button class="pill" id="loadDemo">Load demo</button></div>
  <div class="reader" id="reader">
    <div class="course">Korean Movie Word Reader</div>
    <div class="empty">Type a Korean sentence below. It will show every Korean word with English underneath, then the full sentence translation.</div>
  </div>
</div>

<div class="bottom">
  <div class="inputrow">
    <textarea id="input" rows="1" placeholder="Type or paste Korean subtitle…"></textarea>
    <button class="btn" id="read">Read</button>
    <button class="btn gray" id="mic">🎙️</button>
  </div>
  <div class="smallrow"><span><b class="ico">📌</b>Pin</span><span><b class="ico">✦</b>Explain</span><span><b class="ico">🔁</b>Loop</span><span><b class="ico">🔖</b>Save</span></div>
</div>
<div class="modal" id="modal"><div class="sheet"><button class="close" id="close">Close</button><h3 id="mh"></h3><p id="mp"></p><p id="mr"></p></div></div>
<script>
const $=id=>document.getElementById(id);const reader=$('reader'),input=$('input');
const dict={
'안녕하세요':'hello','안녕':'hello','저는':'I / topic','저':'I','나':'I','나는':'I / topic','제가':'I / subject','오늘':'today','내일':'tomorrow','어제':'yesterday','지금':'now','여기':'here','거기':'there','이것':'this','그것':'that','사람':'person','한국':'Korea','한국어':'Korean language','영어':'English','공부':'study','공부해요':'study','배워요':'learn','좋아요':'good / like','좋은':'good','날씨':'weather','날씨가':'weather + subject','너무':'too / very','정말':'really','많이':'a lot','조금':'a little','빨리':'quickly','천천히':'slowly','가요':'go','가자':'let’s go','가고':'go and','왔어요':'came','와요':'come','봐요':'see / watch','봤어요':'saw / watched','먹어요':'eat','먹었어요':'ate','마셔요':'drink','있어요':'there is / have','없어요':'there is not','아니에요':'is not','입니다':'is / am','예요':'is','이에요':'is','합니다':'do','해요':'do','했어요':'did','할':'will do','수':'can / ability','있다':'exist / have','없다':'not exist','왜':'why','뭐':'what','어디':'where','누구':'who','언제':'when','어떻게':'how','그리고':'and','하지만':'but','그래서':'so','그러면':'then','괜찮아요':'it is okay','미안해요':'sorry','고마워요':'thank you','사랑해요':'love you','친구':'friend','가족':'family','엄마':'mother','아빠':'father','학교':'school','집':'home','회사':'company','영화':'movie','자막':'subtitles','왕':'king','괴물':'monster','도깨비':'goblin','악마':'demon','마왕':'demon king','손오공':'Wukong','오공':'Wukong','팔계':'Bajie','삼장':'Tang Monk','스님':'monk','사방':'everywhere','사방을':'everywhere + object','찾았어요':'found / searched','봤다':'saw','봤는데':'saw but','없네요':'not here','없어':'not here','있네':'is here','길':'road','문':'door','산':'mountain','물':'water','불':'fire','칼':'knife','사람들':'people','마을':'village','다쳤어요':'was hurt','막아야':'must stop','막자':'let’s stop','갑시다':'let’s go','조심해':'be careful','도와주세요':'please help'};
const particles=['은','는','이','가','을','를','에','에서','도','만','와','과','랑','하고','부터','까지','으로','로'];
const endings=[['했어요','did'],['았어요','past tense'],['었어요','past tense'],['겠어요','will / guess'],['네요','I see / noticing'],['습니다','formal ending'],['입니다','is/am'],['예요','is'],['이에요','is'],['해요','do'],['어요','polite ending'],['아요','polite ending']];
const RI=['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'],RM=['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'],RF=['','k','k','k','n','n','n','t','l','k','m','l','l','l','p','l','m','p','p','t','t','ng','t','t','k','t','p','t'];
function romanize(s){return [...s].map(ch=>{let c=ch.charCodeAt(0);if(c<0xAC00||c>0xD7A3)return ch;let i=c-0xAC00,f=i%28,m=((i-f)/28)%21,ini=(((i-f)/28)-m)/21;return RI[ini]+RM[m]+RF[f]}).join('')}
function clean(w){return w.replace(/[.,!?;:"'“”‘’()\[\]{}…·，。？！]/g,'')}
function gloss(w){let x=clean(w);if(!x)return ''; if(dict[x])return dict[x]; for(const p of particles){ if(x.length>1&&x.endsWith(p)){let stem=x.slice(0,-p.length); if(dict[stem]) return dict[stem]+' + '+particleName(p); }} for(const [e,g] of endings){ if(x.length>e.length&&x.endsWith(e)){let stem=x.slice(0,-e.length); if(dict[stem]) return dict[stem]+' + '+g; }} return 'tap';}
function particleName(p){return {'은':'topic','는':'topic','이':'subject','가':'subject','을':'object','를':'object','에':'to/at','에서':'at/from','도':'also','만':'only','와':'and/with','과':'and/with','랑':'with','하고':'and/with','부터':'from','까지':'until','으로':'by/to','로':'by/to'}[p]||p}
async function translateSentence(text){try{const r=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair=ko|en');const d=await r.json();let t=d?.responseData?.translatedText||'';if(/MYMEMORY|INVALID/i.test(t))return '';return t}catch{return ''}}
async function addLine(text, knownTrans=''){document.querySelector('.empty')?.remove();const line=document.createElement('div');line.className='line';line.innerHTML='<div class="speaker">🔊</div><div class="linebody"><div class="words"></div><div class="sent">Translating full sentence…</div><div class="koraw"></div></div><div class="star">☆</div><div class="more">⋯</div>';reader.appendChild(line);const words=line.querySelector('.words');text.trim().split(/\s+/).filter(Boolean).forEach(w=>{const g=gloss(w),r=romanize(clean(w));const btn=document.createElement('button');btn.className='w';btn.innerHTML=`<span class="roman">${esc(r)}</span><span class="ko">${esc(w)}</span><span class="en">${esc(g)}</span>`;btn.onclick=()=>showWord(w,g,r);words.appendChild(btn)});line.querySelector('.koraw').textContent=text;line.querySelector('.sent').textContent=knownTrans||await translateSentence(text)||'(full sentence translation not returned)';reader.scrollTop=reader.scrollHeight}
function showWord(w,g,r){$('mh').textContent=clean(w);$('mp').textContent='Meaning: '+g;$('mr').textContent='Reading: '+r;$('modal').style.display='grid'}$('close').onclick=()=>$('modal').style.display='none';function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
$('read').onclick=()=>{let t=input.value.trim();if(t){input.value='';input.style.height='auto';addLine(t)}};input.oninput=()=>{input.style.height='auto';input.style.height=Math.min(100,input.scrollHeight)+'px'};input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('read').click()}};
$('loadDemo').onclick=async()=>{reader.innerHTML='<div class="course">Demon King | Classics | Korean</div>';await addLine('오공과 팔계는 사방을 다 봤어요','Wukong and Bajie have looked everywhere.');await addLine('하지만 삼장은 여기 없네요','But Tang Monk is not here.');await addLine('이 괴물이 마을 사람들을 다쳤어요','This monster hurt the villagers.');await addLine('우리 빨리 가서 막아야 해요','We must go quickly and stop him.');};
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;let rec,live=false;$('mic').onclick=()=>{if(!SR){alert('Speech recognition may not work on iPhone Safari. Typing works.');return} if(live){rec.stop();return} rec=new SR();rec.lang='ko-KR';rec.interimResults=true;rec.continuous=false;rec.onresult=e=>{let out='';for(let i=0;i<e.results.length;i++)out+=e.results[i][0].transcript;input.value=out};rec.onend=()=>{live=false;$('mic').textContent='🎙️';if(input.value.trim())$('read').click()};rec.onerror=()=>{live=false;$('mic').textContent='🎙️';alert('Mic stopped. On iPhone this is often limited by Safari.');};live=true;$('mic').textContent='⏹';rec.start()};
</script>
</body>
</html>
